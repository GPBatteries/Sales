<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:   #16a34a;
      --green-l: #22c55e;
      --green-d: #14532d;
      --ink:     #0a0f0d;
      --ink-2:   #1e2b24;
      --muted:   #6b7f73;
      --border:  rgba(10,15,13,.10);
      --bg:      #f0f4f1;
      --card:    #ffffff;
      --radius:  20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100svh;
      padding: 24px 16px 48px;
      overflow-x: hidden;
    }

    /* ─── subtle background texture ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 80% 10%, rgba(22,163,74,.10) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 10% 80%, rgba(22,163,74,.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow:
        0 1px 2px rgba(10,15,13,.04),
        0 8px 24px rgba(10,15,13,.07),
        0 32px 64px rgba(10,15,13,.05);
      overflow: hidden;
      animation: rise .55s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise {
      from { opacity:0; transform: translateY(22px) scale(.98); }
      to   { opacity:1; transform: none; }
    }

    /* ─── HERO HEADER ─── */
    .hero {
      position: relative;
      padding: 28px 24px 24px;
      background: linear-gradient(145deg, #0f1f16 0%, #1a3326 55%, #0d2118 100%);
      overflow: hidden;
    }

    /* decorative circle */
    .hero::after {
      content: '';
      position: absolute;
      width: 340px; height: 340px;
      border-radius: 50%;
      border: 60px solid rgba(22,163,74,.07);
      top: -120px; right: -80px;
      pointer-events: none;
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .company-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 5px 12px 5px 8px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green-l);
      box-shadow: 0 0 0 3px rgba(34,197,94,.25);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(34,197,94,.25); }
      50%      { box-shadow: 0 0 0 6px rgba(34,197,94,.10); }
    }
    .company-name {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,.75);
      letter-spacing: .4px;
    }

    .logo-wrap {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      box-shadow: none;
      flex-shrink: 0;
    }
    .logo-wrap img {
      width: 48px; height: 48px;
      object-fit: contain;
      display: block;
    }

    .hero-name {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -.3px;
      position: relative;
    }
    .hero-role {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 300;
      color: rgba(255,255,255,.55);
      letter-spacing: .2px;
    }

    /* green accent line under name */
    .hero-accent {
      display: block;
      width: 36px; height: 3px;
      background: linear-gradient(90deg, var(--green-l), var(--green));
      border-radius: 2px;
      margin-top: 12px;
    }

    /* ─── BODY ─── */
    .body {
      padding: 20px 20px 24px;
    }

    /* ─── CONTACT ROWS ─── */
    .rows { display: flex; flex-direction: column; gap: 1px; }

    .row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 14px;
      border-radius: 12px;
      transition: background .15s;
      text-decoration: none;
      color: inherit;
    }
    .row:hover { background: rgba(22,163,74,.06); }

    .row-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: rgba(22,163,74,.09);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .row-icon svg { width: 17px; height: 17px; color: var(--green); }

    .row-text { flex: 1; min-width: 0; }
    .row-label { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: .4px; text-transform: uppercase; margin-bottom: 2px; }
    .row-value { font-size: 14px; font-weight: 500; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row-value.wrap-val { white-space: normal; line-height: 1.5; }

    .row-arrow { color: rgba(10,15,13,.2); flex-shrink: 0; }
    .row-arrow svg { width: 14px; height: 14px; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    /* ─── ACTION BUTTONS ─── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 18px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      background: rgba(10,15,13,.03);
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
      letter-spacing: .1px;
    }
    .btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .btn:hover { background: rgba(10,15,13,.07); }
    .btn:active { transform: scale(.97); }

    .btn.primary {
      grid-column: span 2;
      background: linear-gradient(135deg, var(--green) 0%, #15803d 100%);
      border-color: transparent;
      color: #fff;
      font-size: 15px;
      padding: 15px;
      box-shadow: 0 4px 16px rgba(22,163,74,.3), 0 1px 3px rgba(22,163,74,.2);
    }
    .btn.primary:hover {
      background: linear-gradient(135deg, #15803d 0%, #166534 100%);
      box-shadow: 0 6px 20px rgba(22,163,74,.38);
    }

    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }

    /* ─── FOOTER ─── */
    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      opacity: .7;
    }

    @media (min-width: 520px) {
      body { padding: 48px 24px 64px; }
      .hero { padding: 32px 28px 28px; }
      .hero-name { font-size: 36px; }
      .body { padding: 24px 24px 28px; }
    }
  </style>
</head>
